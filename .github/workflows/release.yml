name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (vd: v1.0.1) — phải khớp package.json'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify version matches tag
        shell: pwsh
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $expected = "v$($pkg.version)"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.version }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          if ($tag -ne $expected) {
            Write-Error "Tag '$tag' không khớp package.json version '$($pkg.version)' (cần tag v$($pkg.version))"
            exit 1
          }
          Write-Host "Version OK: $tag"

      - name: Build & publish to GitHub Releases
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ inputs.version || github.ref_name }}
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          if-no-files-found: warn
          retention-days: 30
